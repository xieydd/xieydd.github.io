<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="880" viewBox="0 0 1500 880">
<defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#1F2937"/></marker>
<style>.title{font:700 42px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.subtitle{font:500 21px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.label{font:700 23px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.small{font:500 17px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.tiny{font:500 14px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.mono{font:600 16px Consolas,monospace;fill:#1F2937}</style></defs>
<rect width="1500" height="880" fill="#FFFDF7"/><path d="M40 70 C210 35, 390 55, 680 38" stroke="#FBBF24" stroke-width="16" opacity=".26" fill="none" stroke-linecap="round"/><text x="54" y="76" class="title">EROFS / overlaybd：让沙箱环境快速显现</text><text x="58" y="112" class="subtitle">启动时不要完整下载镜像；先看到目录，真正读文件时再拉数据块。</text><rect x="83" y="224" width="360" height="150" rx="22" fill="#DBEAFE" opacity=".50"/><rect x="80" y="220" width="360" height="150" rx="22" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/><path d="M100 222 C 200.0 217, 320.0 224, 420 221" fill="none" stroke="#2563EB" opacity=".45"/><text x="115" y="278" class="label">Container</text><text x="115" y="316" class="small">overlayfs view</text><text x="115" y="352" class="tiny">upperdir 写入层 + lowerdir 只读层</text><rect x="573" y="189" width="360" height="150" rx="22" fill="#DCFCE7" opacity=".50"/><rect x="570" y="185" width="360" height="150" rx="22" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/><path d="M590 187 C 690.0 182, 810.0 189, 910 186" fill="none" stroke="#16A34A" opacity=".45"/><text x="605" y="243" class="label">EROFS lowerdirs</text><text x="605" y="281" class="small">metadata 先本地可见</text><text x="605" y="317" class="tiny">data blocks 按需从 3FS 拉</text><rect x="573" y="399" width="360" height="150" rx="22" fill="#EDE9FE" opacity=".50"/><rect x="570" y="395" width="360" height="150" rx="22" fill="#EDE9FE" stroke="#7C3AED" stroke-width="3"/><path d="M590 397 C 690.0 392, 810.0 399, 910 396" fill="none" stroke="#7C3AED" opacity=".45"/><text x="605" y="453" class="label">overlaybd</text><text x="605" y="491" class="small">给 microVM 的块设备视图</text><text x="605" y="527" class="tiny">base 共享，只写本地 CoW</text><rect x="1063" y="294" width="330" height="150" rx="22" fill="#FEF3C7" opacity=".50"/><rect x="1060" y="290" width="330" height="150" rx="22" fill="#FEF3C7" stroke="#D97706" stroke-width="3"/><path d="M1080 292 C 1170.0 287, 1280.0 294, 1370 291" fill="none" stroke="#D97706" opacity=".45"/><text x="1095" y="348" class="label">3FS Storage</text><text x="1095" y="386" class="small">共享镜像层 / 快照 / 轨迹</text><path d="M440 295 C 505.0 295, 505.0 260, 570 260" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><path d="M440 295 C 505.0 295, 505.0 470, 570 470" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><path d="M930 260 C 995.0 260, 995.0 350, 1060 350" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><path d="M930 470 C 995.0 470, 995.0 365, 1060 365" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><rect x="223" y="664" width="1060" height="105" rx="22" fill="#FFEDD5" opacity=".50"/><rect x="220" y="660" width="1060" height="105" rx="22" fill="#FFEDD5" stroke="#EA580C" stroke-width="3"/><path d="M240 662 C 573.3333333333333 657, 926.6666666666666 664, 1260 661" fill="none" stroke="#EA580C" opacity=".45"/><text x="260" y="704" class="small">高密度沙箱的核心问题：不要让每个环境重复下载、重复解压、重复缓存同一份只读镜像。</text></svg>