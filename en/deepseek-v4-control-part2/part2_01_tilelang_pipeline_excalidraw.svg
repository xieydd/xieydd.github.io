<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="880" viewBox="0 0 1500 880">
<defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#1F2937"/></marker>
<style>.title{font:700 42px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.subtitle{font:500 21px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.label{font:700 23px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.small{font:500 17px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.tiny{font:500 14px "Virgil","Comic Sans MS",Arial;fill:#6B7280}</style></defs>
<rect width="1500" height="880" fill="#FFFDF7"/><path d="M40 70 C210 35, 390 55, 650 38" stroke="#FBBF24" stroke-width="16" opacity=".26" fill="none" stroke-linecap="round"/><text x="54" y="76" class="title">TileLang：把 Python 热路径赶出去</text><text x="58" y="112" class="subtitle">复杂 kernel 不只要快，还要可检查、可生成、可复现。</text><rect x="93" y="244" width="250" height="120" rx="22" fill="#DBEAFE" opacity=".5"/><rect x="90" y="240" width="250" height="120" rx="22" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/><path d="M110 242 C 173.33333333333331 237, 256.66666666666663 244, 320 241" fill="none" stroke="#2563EB" opacity=".45"/><text x="112" y="290" class="label">DSL / Frontend</text><text x="112" y="324" class="tiny">描述 tile、layout、pipeline</text><rect x="433" y="244" width="250" height="120" rx="22" fill="#DCFCE7" opacity=".5"/><rect x="430" y="240" width="250" height="120" rx="22" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/><path d="M450 242 C 513.3333333333334 237, 596.6666666666666 244, 660 241" fill="none" stroke="#16A34A" opacity=".45"/><text x="452" y="290" class="label">IR</text><text x="452" y="324" class="tiny">同时知道 device 与 host 约束</text><rect x="773" y="189" width="270" height="120" rx="22" fill="#EDE9FE" opacity=".5"/><rect x="770" y="185" width="270" height="120" rx="22" fill="#EDE9FE" stroke="#7C3AED" stroke-width="3"/><path d="M790 187 C 860.0 182, 950.0 189, 1020 186" fill="none" stroke="#7C3AED" opacity=".45"/><text x="792" y="235" class="label">Device Kernel</text><text x="792" y="269" class="tiny">GPU 上真正算</text><rect x="773" y="349" width="270" height="120" rx="22" fill="#FFEDD5" opacity=".5"/><rect x="770" y="345" width="270" height="120" rx="22" fill="#FFEDD5" stroke="#EA580C" stroke-width="3"/><path d="M790 347 C 860.0 342, 950.0 349, 1020 346" fill="none" stroke="#EA580C" opacity=".45"/><text x="792" y="395" class="label">Host Launcher</text><text x="792" y="429" class="tiny">C/C++ 检查与参数打包</text><rect x="1123" y="264" width="270" height="140" rx="22" fill="#FEF3C7" opacity=".5"/><rect x="1120" y="260" width="270" height="140" rx="22" fill="#FEF3C7" stroke="#D97706" stroke-width="3"/><path d="M1140 262 C 1210.0 257, 1300.0 264, 1370 261" fill="none" stroke="#D97706" opacity=".45"/><text x="1142" y="310" class="label">Runtime Call</text><text x="1142" y="344" class="tiny">TVM-FFI + DLPack zero-copy</text><path d="M340 300 C 385.0 300, 385.0 300, 430 300" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><path d="M680 300 C 725.0 300, 725.0 245, 770 245" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><path d="M680 310 C 725.0 310, 725.0 405, 770 405" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><path d="M1040 245 C 1080.0 245, 1080.0 300, 1120 300" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><path d="M1040 405 C 1080.0 405, 1080.0 340, 1120 340" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><rect x="183" y="589" width="1120" height="120" rx="22" fill="#CCFBF1" opacity=".5"/><rect x="180" y="585" width="1120" height="120" rx="22" fill="#CCFBF1" stroke="#0D9488" stroke-width="3"/><path d="M200 587 C 553.3333333333333 582, 926.6666666666666 589, 1280 586" fill="none" stroke="#0D9488" opacity=".45"/><text x="220" y="635" class="small">原来每次 Python 动态检查 dtype/shape/stride/device；现在生成的 host code 在 C/C++ 里做。</text><text x="220" y="675" class="small">kernel 很小时，几十微秒 host overhead 可能比 kernel 本身还贵。</text></svg>