<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
<defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#1F2937"/></marker>
<style>.title{font:700 42px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.subtitle{font:500 21px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.label{font:700 23px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.small{font:500 17px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.tiny{font:500 14px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.mono{font:600 16px Consolas,monospace;fill:#1F2937}</style></defs>
<rect width="1500" height="900" fill="#FFFDF7"/><path d="M40 70 C210 35, 390 55, 680 38" stroke="#FBBF24" stroke-width="16" opacity=".26" fill="none" stroke-linecap="round"/><text x="54" y="76" class="title">OPD + GRM：先让专家变强，再让学生学会判断</text><text x="58" y="112" class="subtitle">难验证任务不能只靠标准答案，奖励函数要会解释。</text><rect x="83" y="219" width="390" height="165" rx="22" fill="#DBEAFE" opacity=".50"/><rect x="80" y="215" width="390" height="165" rx="22" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/><path d="M100 217 C 210.0 212, 340.0 219, 450 216" fill="none" stroke="#2563EB" opacity=".45"/><text x="115" y="270" class="label">Specialists</text><text x="115" y="308" class="small">数学 / 代码 / Agent / 指令遵循</text><text x="115" y="344" class="tiny">各自 SFT + GRPO</text><rect x="573" y="219" width="390" height="165" rx="22" fill="#EDE9FE" opacity=".50"/><rect x="570" y="215" width="390" height="165" rx="22" fill="#EDE9FE" stroke="#7C3AED" stroke-width="3"/><path d="M590 217 C 700.0 212, 830.0 219, 940 216" fill="none" stroke="#7C3AED" opacity=".45"/><text x="605" y="270" class="label">OPD</text><text x="605" y="308" class="small">student 在自己的轨迹上学 teacher 分布</text><text x="605" y="344" class="tiny">full-vocab KL 更稳，但更贵</text><rect x="1073" y="219" width="340" height="165" rx="22" fill="#DCFCE7" opacity=".50"/><rect x="1070" y="215" width="340" height="165" rx="22" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/><path d="M1090 217 C 1183.3333333333333 212, 1296.6666666666667 219, 1390 216" fill="none" stroke="#16A34A" opacity=".45"/><text x="1105" y="270" class="label">Unified Model</text><text x="1105" y="308" class="small">不是合并权重</text><text x="1105" y="344" class="tiny">而是合并行为分布</text><path d="M470 300 C 520.0 300, 520.0 300, 570 300" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><path d="M960 300 C 1015.0 300, 1015.0 300, 1070 300" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><rect x="213" y="574" width="1080" height="155" rx="22" fill="#FFEDD5" opacity=".50"/><rect x="210" y="570" width="1080" height="155" rx="22" fill="#FFEDD5" stroke="#EA580C" stroke-width="3"/><path d="M230 572 C 570.0 567, 930.0 574, 1270 571" fill="none" stroke="#EA580C" opacity=".45"/><text x="250" y="625" class="label">Generative Reward Model</text><text x="250" y="664" class="small">输入 prompt + answer + rubric，生成 critique / verdict，再转成 reward。</text><text x="250" y="700" class="small">适合写作、办公、Agent 这种没有单一标准答案的任务。</text></svg>