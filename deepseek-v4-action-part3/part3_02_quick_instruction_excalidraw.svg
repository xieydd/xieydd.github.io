<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="880" viewBox="0 0 1500 880">
<defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#1F2937"/></marker>
<style>.title{font:700 42px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.subtitle{font:500 21px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.label{font:700 23px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.small{font:500 17px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.tiny{font:500 14px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.mono{font:600 16px Consolas,monospace;fill:#1F2937}</style></defs>
<rect width="1500" height="880" fill="#FFFDF7"/><path d="M40 70 C210 35, 390 55, 680 38" stroke="#FBBF24" stroke-width="16" opacity=".26" fill="none" stroke-linecap="round"/><text x="54" y="76" class="title">Quick Instruction：主模型顺手做掉小模型的活</text><text x="58" y="112" class="subtitle">要不要搜、搜什么、要不要读 URL，这些前置小任务复用同一份 KV cache。</text><rect x="93" y="234" width="310" height="145" rx="22" fill="#DBEAFE" opacity=".50"/><rect x="90" y="230" width="310" height="145" rx="22" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/><path d="M110 232 C 193.33333333333331 227, 296.66666666666663 234, 380 231" fill="none" stroke="#2563EB" opacity=".45"/><text x="125" y="286" class="label">User Prompt</text><text x="125" y="324" class="small">长上下文已经 prefill</text><rect x="523" y="174" width="300" height="85" rx="18" fill="#DCFCE7" opacity=".50"/><rect x="520" y="170" width="300" height="85" rx="18" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/><path d="M540 172 C 620.0 167, 720.0 174, 800 171" fill="none" stroke="#16A34A" opacity=".45"/><text x="544" y="208" class="label">&lt;|action|&gt;</text><text x="544" y="235" class="tiny">要不要搜索？</text><path d="M400 300 C 460.0 300, 460.0 212, 520 212" fill="none" stroke="#4B5563" stroke-width="3" marker-end="url(#a)" stroke-dasharray="8 8"/><rect x="523" y="294" width="300" height="85" rx="18" fill="#EDE9FE" opacity=".50"/><rect x="520" y="290" width="300" height="85" rx="18" fill="#EDE9FE" stroke="#7C3AED" stroke-width="3"/><path d="M540 292 C 620.0 287, 720.0 294, 800 291" fill="none" stroke="#7C3AED" opacity=".45"/><text x="544" y="328" class="label">&lt;|query|&gt;</text><text x="544" y="355" class="tiny">搜索词是什么？</text><path d="M400 300 C 460.0 300, 460.0 332, 520 332" fill="none" stroke="#4B5563" stroke-width="3" marker-end="url(#a)" stroke-dasharray="8 8"/><rect x="523" y="414" width="300" height="85" rx="18" fill="#DCFCE7" opacity=".50"/><rect x="520" y="410" width="300" height="85" rx="18" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/><path d="M540 412 C 620.0 407, 720.0 414, 800 411" fill="none" stroke="#16A34A" opacity=".45"/><text x="544" y="448" class="label">&lt;|domain|&gt;</text><text x="544" y="475" class="tiny">属于哪个领域？</text><path d="M400 300 C 460.0 300, 460.0 452, 520 452" fill="none" stroke="#4B5563" stroke-width="3" marker-end="url(#a)" stroke-dasharray="8 8"/><rect x="523" y="534" width="300" height="85" rx="18" fill="#EDE9FE" opacity=".50"/><rect x="520" y="530" width="300" height="85" rx="18" fill="#EDE9FE" stroke="#7C3AED" stroke-width="3"/><path d="M540 532 C 620.0 527, 720.0 534, 800 531" fill="none" stroke="#7C3AED" opacity=".45"/><text x="544" y="568" class="label">&lt;|read_url|&gt;</text><text x="544" y="595" class="tiny">URL 要不要读？</text><path d="M400 300 C 460.0 300, 460.0 572, 520 572" fill="none" stroke="#4B5563" stroke-width="3" marker-end="url(#a)" stroke-dasharray="8 8"/><rect x="953" y="264" width="360" height="145" rx="22" fill="#FEF3C7" opacity=".50"/><rect x="950" y="260" width="360" height="145" rx="22" fill="#FEF3C7" stroke="#D97706" stroke-width="3"/><path d="M970 262 C 1070.0 257, 1190.0 264, 1290 261" fill="none" stroke="#D97706" opacity=".45"/><text x="985" y="316" class="label">Short Output</text><text x="985" y="354" class="small">标签 / query / 是否读取</text><text x="985" y="390" class="tiny">然后服务端决定工具路线</text><path d="M820 212 C 885.0 212, 885.0 332, 950 332" fill="none" stroke="#D97706" stroke-width="3" marker-end="url(#a)"/><path d="M820 332 C 885.0 332, 885.0 332, 950 332" fill="none" stroke="#D97706" stroke-width="3" marker-end="url(#a)"/><path d="M820 452 C 885.0 452, 885.0 332, 950 332" fill="none" stroke="#D97706" stroke-width="3" marker-end="url(#a)"/><path d="M820 572 C 885.0 572, 885.0 332, 950 332" fill="none" stroke="#D97706" stroke-width="3" marker-end="url(#a)"/><rect x="268" y="654" width="970" height="110" rx="22" fill="#CCFBF1" opacity=".50"/><rect x="265" y="650" width="970" height="110" rx="22" fill="#CCFBF1" stroke="#0D9488" stroke-width="3"/><path d="M285 652 C 588.3333333333333 647, 911.6666666666666 654, 1215 651" fill="none" stroke="#0D9488" opacity=".45"/><text x="305" y="696" class="small">本质：不是让模型正式回答，而是用特殊 token 触发一个短任务。</text><text x="305" y="730" class="small">省掉多个小模型重复读 prompt 的 prefill 成本。</text></svg>