<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
<defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#1F2937"/></marker>
<style>.title{font:700 42px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.subtitle{font:500 21px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.label{font:700 23px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.small{font:500 17px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.tiny{font:500 14px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.mono{font:600 16px Consolas,monospace;fill:#1F2937}</style></defs>
<rect width="1500" height="900" fill="#FFFDF7"/><path d="M40 70 C210 35, 390 55, 680 38" stroke="#FBBF24" stroke-width="16" opacity=".26" fill="none" stroke-linecap="round"/><text x="54" y="76" class="title">Rollout WAL：中断后继续原轨迹</text><text x="58" y="112" class="subtitle">RL 数据不能因为机器被抢占而重新采样。</text><rect x="83" y="264" width="250" height="115" rx="22" fill="#DBEAFE" opacity=".50"/><rect x="80" y="260" width="250" height="115" rx="22" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/><path d="M100 262 C 163.33333333333331 257, 246.66666666666666 264, 310 261" fill="none" stroke="#2563EB" opacity=".45"/><text x="104" y="308" class="label">Generate</text><text x="104" y="342" class="tiny">每生成一个 token</text><rect x="413" y="264" width="250" height="115" rx="22" fill="#DCFCE7" opacity=".50"/><rect x="410" y="260" width="250" height="115" rx="22" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/><path d="M430 262 C 493.3333333333333 257, 576.6666666666666 264, 640 261" fill="none" stroke="#16A34A" opacity=".45"/><text x="434" y="308" class="label">Append WAL</text><text x="434" y="342" class="tiny">token-granular 日志</text><rect x="743" y="264" width="250" height="115" rx="22" fill="#FCE7F3" opacity=".50"/><rect x="740" y="260" width="250" height="115" rx="22" fill="#FCE7F3" stroke="#DB2777" stroke-width="3"/><path d="M760 262 C 823.3333333333334 257, 906.6666666666666 264, 970 261" fill="none" stroke="#DB2777" opacity=".45"/><text x="764" y="308" class="label">Preempt / Fail</text><text x="764" y="342" class="tiny">GPU 被抢占或故障</text><rect x="1073" y="264" width="290" height="115" rx="22" fill="#EDE9FE" opacity=".50"/><rect x="1070" y="260" width="290" height="115" rx="22" fill="#EDE9FE" stroke="#7C3AED" stroke-width="3"/><path d="M1090 262 C 1166.6666666666667 257, 1263.3333333333333 264, 1340 261" fill="none" stroke="#7C3AED" opacity=".45"/><text x="1094" y="308" class="label">Resume</text><text x="1094" y="342" class="tiny">有 KV 直接继续；无 KV 重建</text><path d="M330 318 C 370.0 318, 370.0 318, 410 318" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><path d="M660 318 C 700.0 318, 700.0 318, 740 318" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><path d="M990 318 C 1030.0 318, 1030.0 318, 1070 318" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><rect x="193" y="564" width="1110" height="150" rx="22" fill="#FFEDD5" opacity=".50"/><rect x="190" y="560" width="1110" height="150" rx="22" fill="#FFEDD5" stroke="#EA580C" stroke-width="3"/><path d="M210 562 C 560.0 557, 930.0 564, 1280 561" fill="none" stroke="#EA580C" opacity=".45"/><text x="235" y="615" class="label">为什么不能从头重采样？</text><text x="235" y="654" class="small">短回答更容易在中断前完成；长回答更容易被打断后重采样。</text><text x="235" y="690" class="small">久而久之，rollout 数据会偏向短 completion，这就是 length bias。</text></svg>