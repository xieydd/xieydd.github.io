<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="940" viewBox="0 0 1500 940">
<defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#1F2937"/></marker>
<style>.title{font:700 42px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.subtitle{font:500 21px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.label{font:700 23px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.small{font:500 17px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.tiny{font:500 14px "Virgil","Comic Sans MS",Arial;fill:#6B7280}</style></defs>
<rect width="1500" height="940" fill="#FFFDF7"/><path d="M40 70 C210 35, 390 55, 650 38" stroke="#FBBF24" stroke-width="16" opacity=".26" fill="none" stroke-linecap="round"/><text x="54" y="76" class="title">训练与推理的两张欠条</text><text x="58" y="112" class="subtitle">Muon 要完整矩阵；KV cache 要分层管理。</text><rect x="83" y="209" width="620" height="265" rx="22" fill="#FFEDD5" opacity=".5"/><rect x="80" y="205" width="620" height="265" rx="22" fill="#FFEDD5" stroke="#EA580C" stroke-width="3"/><path d="M100 207 C 286.66666666666663 202, 493.3333333333333 209, 680 206" fill="none" stroke="#EA580C" opacity=".45"/><text x="115" y="260" class="label">Muon vs ZeRO</text><text x="115" y="300" class="small">Muon：要完整矩阵做正交化</text><text x="115" y="335" class="small">ZeRO：想把参数/状态切碎省显存</text><rect x="138" y="374" width="210" height="65" rx="22" fill="#fff" opacity=".5"/><rect x="135" y="370" width="210" height="65" rx="22" fill="#fff" stroke="#4B5563" stroke-width="3"/><path d="M155 372 C 205.0 367, 275.0 374, 325 371" fill="none" stroke="#4B5563" opacity=".45"/><text x="160" y="412" class="tiny">rank0: W1 整块</text><rect x="383" y="374" width="210" height="65" rx="22" fill="#fff" opacity=".5"/><rect x="380" y="370" width="210" height="65" rx="22" fill="#fff" stroke="#4B5563" stroke-width="3"/><path d="M400 372 C 450.0 367, 520.0 374, 570 371" fill="none" stroke="#4B5563" opacity=".45"/><text x="405" y="412" class="tiny">rank1: W2 整块</text><text x="115" y="455" class="tiny">V4 的思路：不随便切开逻辑矩阵，而是分配完整矩阵。</text><rect x="803" y="209" width="620" height="265" rx="22" fill="#DBEAFE" opacity=".5"/><rect x="800" y="205" width="620" height="265" rx="22" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/><path d="M820 207 C 1006.6666666666666 202, 1213.3333333333333 209, 1400 206" fill="none" stroke="#2563EB" opacity=".45"/><text x="835" y="260" class="label">KV Cache OS</text><text x="835" y="300" class="small">classical cache：CSA/HCA compressed entries</text><text x="835" y="335" class="small">state cache：SWA window + uncompressed tail</text><text x="835" y="370" class="small">on-disk cache：共享前缀落盘复用</text><rect x="223" y="624" width="470" height="150" rx="22" fill="#DCFCE7" opacity=".5"/><rect x="220" y="620" width="470" height="150" rx="22" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/><path d="M240 622 C 376.66666666666663 617, 533.3333333333333 624, 670 621" fill="none" stroke="#16A34A" opacity=".45"/><text x="255" y="675" class="label">Tensor-level Checkpoint</text><text x="255" y="713" class="tiny">不以 module 为单位粗暴重算；标注 tensor，自动找最小重算子图。</text><rect x="813" y="624" width="470" height="150" rx="22" fill="#EDE9FE" opacity=".5"/><rect x="810" y="620" width="470" height="150" rx="22" fill="#EDE9FE" stroke="#7C3AED" stroke-width="3"/><path d="M830 622 C 966.6666666666666 617, 1123.3333333333333 624, 1260 621" fill="none" stroke="#7C3AED" opacity=".45"/><text x="845" y="675" class="label">Context Parallelism</text><text x="845" y="713" class="tiny">压缩窗口会跨 rank；先交换边界 token，再 all-gather compressed KV。</text></svg>