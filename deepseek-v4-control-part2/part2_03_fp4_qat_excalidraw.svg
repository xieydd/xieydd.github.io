<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="880" viewBox="0 0 1500 880">
<defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#1F2937"/></marker>
<style>.title{font:700 42px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.subtitle{font:500 21px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.label{font:700 23px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.small{font:500 17px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.tiny{font:500 14px "Virgil","Comic Sans MS",Arial;fill:#6B7280}</style></defs>
<rect width="1500" height="880" fill="#FFFDF7"/><path d="M40 70 C210 35, 390 55, 650 38" stroke="#FBBF24" stroke-width="16" opacity=".26" fill="none" stroke-linecap="round"/><text x="54" y="76" class="title">FP4 QAT：不是全模型 4-bit，而是定点打击</text><text x="58" y="112" class="subtitle">压最占显存的 expert weights，和最影响长上下文的 CSA indexer QK。</text><rect x="118" y="234" width="380" height="165" rx="22" fill="#DBEAFE" opacity=".5"/><rect x="115" y="230" width="380" height="165" rx="22" fill="#DBEAFE" stroke="#2563EB" stroke-width="3"/><path d="M135 232 C 241.66666666666669 227, 368.33333333333337 234, 475 231" fill="none" stroke="#2563EB" opacity=".45"/><text x="150" y="285" class="label">MoE Expert Weights</text><text x="150" y="322" class="small">参数大头，压它最省显存</text><rect x="583" y="234" width="380" height="165" rx="22" fill="#EDE9FE" opacity=".5"/><rect x="580" y="230" width="380" height="165" rx="22" fill="#EDE9FE" stroke="#7C3AED" stroke-width="3"/><path d="M600 232 C 706.6666666666666 227, 833.3333333333334 234, 940 231" fill="none" stroke="#7C3AED" opacity=".45"/><text x="615" y="285" class="label">CSA Indexer QK</text><text x="615" y="322" class="small">百万上下文里反复检索</text><rect x="1048" y="234" width="330" height="165" rx="22" fill="#DCFCE7" opacity=".5"/><rect x="1045" y="230" width="330" height="165" rx="22" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/><path d="M1065 232 C 1155.0 227, 1265.0 234, 1355 231" fill="none" stroke="#16A34A" opacity=".45"/><text x="1080" y="285" class="label">BF16 Scores</text><text x="1080" y="322" class="small">top-k selector 更快</text><path d="M495 312 C 537.5 312, 537.5 312, 580 312" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><path d="M960 312 C 1002.5 312, 1002.5 312, 1045 312" fill="none" stroke="#1F2937" stroke-width="3" marker-end="url(#a)"/><rect x="263" y="564" width="960" height="125" rx="22" fill="#FFEDD5" opacity=".5"/><rect x="260" y="560" width="960" height="125" rx="22" fill="#FFEDD5" stroke="#EA580C" stroke-width="3"/><path d="M280 562 C 580.0 557, 900.0 564, 1200 561" fill="none" stroke="#EA580C" opacity=".45"/><text x="300" y="610" class="label">核心判断</text><text x="300" y="650" class="small">FP4 在 V4 里不是炫技；它被放在两个系统瓶颈上：巨大的专家权重和长上下文检索。</text></svg>