<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900">
<defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10" fill="#1F2937"/></marker>
<style>.title{font:700 42px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.subtitle{font:500 21px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.label{font:700 23px "Virgil","Comic Sans MS",Arial;fill:#1F2937}.small{font:500 17px "Virgil","Comic Sans MS",Arial;fill:#6B7280}.tiny{font:500 14px "Virgil","Comic Sans MS",Arial;fill:#6B7280}</style></defs>
<rect width="1500" height="900" fill="#FFFDF7"/><path d="M40 70 C210 35, 390 55, 650 38" stroke="#FBBF24" stroke-width="16" opacity=".26" fill="none" stroke-linecap="round"/><text x="54" y="76" class="title">Determinism：不要让浮点累加顺序决定命运</text><text x="58" y="112" class="subtitle">同一个请求换 batch 后还要一样，才方便复现线上问题。</text><rect x="83" y="209" width="560" height="250" rx="22" fill="#FCE7F3" opacity=".5"/><rect x="80" y="205" width="560" height="250" rx="22" fill="#FCE7F3" stroke="#DB2777" stroke-width="3"/><path d="M100 207 C 266.66666666666663 202, 453.3333333333333 209, 620 206" fill="none" stroke="#DB2777" opacity=".45"/><text x="115" y="258" class="label">普通 atomicAdd / split-K</text><text x="115" y="296" class="small">多个 SM / split 同时写同一个结果</text><rect x="153" y="354" width="95" height="55" rx="22" fill="#fff" opacity=".5"/><rect x="150" y="350" width="95" height="55" rx="22" fill="#fff" stroke="#4B5563" stroke-width="3"/><path d="M170 352 C 181.66666666666666 347, 213.33333333333334 354, 225 351" fill="none" stroke="#4B5563" opacity=".45"/><text x="176" y="386" class="small">SM0</text><path d="M245 378 C 385.0 378, 385.0 360, 525 360" fill="none" stroke="#DB2777" stroke-width="3" marker-end="url(#a)"/><rect x="273" y="334" width="95" height="55" rx="22" fill="#fff" opacity=".5"/><rect x="270" y="330" width="95" height="55" rx="22" fill="#fff" stroke="#4B5563" stroke-width="3"/><path d="M290 332 C 301.6666666666667 327, 333.3333333333333 334, 345 331" fill="none" stroke="#4B5563" opacity=".45"/><text x="296" y="366" class="small">SM1</text><path d="M365 358 C 445.0 358, 445.0 360, 525 360" fill="none" stroke="#DB2777" stroke-width="3" marker-end="url(#a)"/><rect x="393" y="364" width="95" height="55" rx="22" fill="#fff" opacity=".5"/><rect x="390" y="360" width="95" height="55" rx="22" fill="#fff" stroke="#4B5563" stroke-width="3"/><path d="M410 362 C 421.6666666666667 357, 453.3333333333333 364, 465 361" fill="none" stroke="#4B5563" opacity=".45"/><text x="416" y="396" class="small">SM2</text><path d="M485 388 C 505.0 388, 505.0 360, 525 360" fill="none" stroke="#DB2777" stroke-width="3" marker-end="url(#a)"/><rect x="508" y="329" width="90" height="75" rx="22" fill="#fff" opacity=".5"/><rect x="505" y="325" width="90" height="75" rx="22" fill="#fff" stroke="#DB2777" stroke-width="3"/><path d="M525 327 C 535.0 322, 565.0 329, 575 326" fill="none" stroke="#DB2777" opacity=".45"/><text x="525" y="370" class="small">dKV</text><text x="118" y="430" class="tiny">谁先加、谁后加不固定；浮点加法顺序变，最后 bit 可能变。</text><rect x="848" y="209" width="560" height="250" rx="22" fill="#DCFCE7" opacity=".5"/><rect x="845" y="205" width="560" height="250" rx="22" fill="#DCFCE7" stroke="#16A34A" stroke-width="3"/><path d="M865 207 C 1031.6666666666667 202, 1218.3333333333333 209, 1385 206" fill="none" stroke="#16A34A" opacity=".45"/><text x="880" y="258" class="label">V4 的固定顺序</text><text x="880" y="296" class="small">先写独立 buffer，再按顺序 reduce</text><rect x="903" y="354" width="95" height="55" rx="22" fill="#fff" opacity=".5"/><rect x="900" y="350" width="95" height="55" rx="22" fill="#fff" stroke="#4B5563" stroke-width="3"/><path d="M920 352 C 931.6666666666666 347, 963.3333333333334 354, 975 351" fill="none" stroke="#4B5563" opacity=".45"/><text x="922" y="386" class="small">buf0</text><path d="M995 378 C 1132.5 378, 1132.5 360, 1270 360" fill="none" stroke="#16A34A" stroke-width="3" marker-end="url(#a)"/><rect x="1023" y="334" width="95" height="55" rx="22" fill="#fff" opacity=".5"/><rect x="1020" y="330" width="95" height="55" rx="22" fill="#fff" stroke="#4B5563" stroke-width="3"/><path d="M1040 332 C 1051.6666666666667 327, 1083.3333333333333 334, 1095 331" fill="none" stroke="#4B5563" opacity=".45"/><text x="1042" y="366" class="small">buf1</text><path d="M1115 358 C 1192.5 358, 1192.5 360, 1270 360" fill="none" stroke="#16A34A" stroke-width="3" marker-end="url(#a)"/><rect x="1143" y="364" width="95" height="55" rx="22" fill="#fff" opacity=".5"/><rect x="1140" y="360" width="95" height="55" rx="22" fill="#fff" stroke="#4B5563" stroke-width="3"/><path d="M1160 362 C 1171.6666666666667 357, 1203.3333333333333 364, 1215 361" fill="none" stroke="#4B5563" opacity=".45"/><text x="1162" y="396" class="small">buf2</text><path d="M1235 388 C 1252.5 388, 1252.5 360, 1270 360" fill="none" stroke="#16A34A" stroke-width="3" marker-end="url(#a)"/><rect x="1253" y="329" width="100" height="75" rx="22" fill="#fff" opacity=".5"/><rect x="1250" y="325" width="100" height="75" rx="22" fill="#fff" stroke="#16A34A" stroke-width="3"/><path d="M1270 327 C 1283.3333333333333 322, 1316.6666666666667 329, 1330 326" fill="none" stroke="#16A34A" opacity=".45"/><text x="1268" y="370" class="small">reduce</text><text x="880" y="430" class="tiny">结果按固定顺序相加，复现实验和 debug 才有共同地面。</text><rect x="303" y="614" width="900" height="125" rx="22" fill="#FEF3C7" opacity=".5"/><rect x="300" y="610" width="900" height="125" rx="22" fill="#FEF3C7" stroke="#D97706" stroke-width="3"/><path d="M320 612 C 600.0 607, 900.0 614, 1180 611" fill="none" stroke="#D97706" opacity=".45"/><text x="340" y="660" class="label">Batch-Invariant 更严格</text><text x="340" y="700" class="small">同一个样本单独跑，或和别的样本拼 batch，输出也应 bitwise 一致。</text></svg>